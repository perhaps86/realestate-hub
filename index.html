  <h1>진행중 물건</h1>
  <p class="desc">온비드 공매·법원경매 물건을 국토부 실거래가 시세와 비교해 <b>시세대비할인율</b><button class="help" type="button" aria-label="시세대비할인율 설명">?<span class="tip"><b>시세대비할인율</b> = (매도예상가 − 총투자금) ÷ 매도예상가.<br>매도예상가는 같은 단지(불가 시 같은 법정동)의 최근 실거래 중앙값 — 면적 ±10%·저층 제외 필터를 거친 표본입니다. 알림·엑셀과 동일 수식.</span></button>을 표시하고, <b>입찰 마감 임박순</b>으로 정렬(지역·유형 필터 가능).
     <b>총투자금</b><button class="help" type="button" aria-label="총투자금 설명">?<span class="tip"><b>총투자금</b> = 최저입찰가 + 취득세(1.1%) + 명도비 + 청소비 + 기타잡비.<br>양도세 제외 세전 기준 — 보유기간별 세후 수치는 엑셀 입찰가산정 시트에서 계산합니다.</span></button>은 최저입찰가 기준 추정값.</p>
